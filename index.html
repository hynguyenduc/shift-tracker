<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#185FA5">
    <meta name="description" content="Tracks work shifts and pay">
    <title>Shifty Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="./resources/roger192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Shift Tracker</h1>
    </header>
    <main>
        <section id="active-view">
            <div id="calendar">
                <div id="month-nav">
                    <button id="prev-button"> &lt; </button>
                    <span id="month-label">This can be empty</span>
                    <button id="next-button"> &gt; </button>
                </div>
                <div id="cal-grid"></div>
            </div>
        </section>
        <section id="history-view">
            <p>paid shifts will show here</p>
        </section>
    </main>
    <nav>
        <button data-tab="active"> Active </button>
        <button data-tab="history"> History </button>
    </nav>
    <script src="app.js"></script>
    <script>
        window.addEventListener('load', function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker
                    .register('./sw.js')
                    .then((registration) => {
                        registration.addEventListener('updatefound', () => {
                            const installingWorker = registration.installing
                            console.log('New service worker being installed:', installingWorker)
                        })
                    })
                    .catch((error) => {
                        console.error(`Service worker registration failed: ${error}`)
                    })
            } else {
                console.error('Service workers are not supported')
            }
                })
    </script>
</body>
</html>
