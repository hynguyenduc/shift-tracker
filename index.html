<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#185FA5">
    <meta name="description" content="Tracks work shifts and pay">
    <title>Shifty Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="./resources/roger192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Shift Tracker</h1>
    </header>
    <main>
        <section id="active-view">
            <div id="calendar">
                <div id="month-nav">
                    <button id="prev-button"> &lt; </button>
                    <span id="month-label">This can be empty</span>
                    <button id="next-button"> &gt; </button>
                </div>
                <div id="cal-grid"></div>
            </div>
        </section>
        <section id="history-view">
            <p>paid shifts will show here</p>
        </section>
    </main>
    <nav>
        <button data-tab="active"> Active </button>
        <button data-tab="history"> History </button>
    </nav>
    <div id="sheet-overlay">
        <div id="shift-sheet">
            <div class="sheet-header">
                <h2 id="sheet-title">Add Shift</h2>
                <button id="close-sheet">✕</button>
            </div>
            <form id="shift-form">
                <div class="form-field">
                    <label for="shift-name">Shift name</label>
                    <input type="text" id="shift-name" placeholder="e.g. Morning Shift">
                </div>
                <div class="form-field">
                    <label for="shift-date">Date worked</label>
                    <input type="date" id="shift-date">
                </div>
                <div class="form-field">
                    <label for="shift-hours">Hours worked</label>
                    <input type="number" id="shift-hours" placeholder="e.g. 8" min="0" step="0.5">
                </div>
                <div class="form-field">
                    <label for="shift-rate">Hourly rate ($)</label>
                    <input type="number" id="shift-rate" placeholder="e.g. 25" min="0" step="0.01">
                </div>
                <div class="form-field">
                    <label>Rate Types</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="rate-type" value="standard" checked>Standard
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="rate-type" value="saturday">Saturday (x1.25)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="rate-type" value="sunday">Sunday (x1.50)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="rate-type" value="publicHoliday">Public Holiday (x2.25)
                        </label>
                    </div>
                    <div id="ph-options" class="hidden">
                        <div class="form-field">
                            <label class="radio-option">
                                <input type="checkbox" id="ph-allday">
                                All day public holiday rate
                            </label>
                        </div>
                        <div class="form-field" id="ph-hours-field">
                            <label for="ph-hours">Hours at public holiday rates</label>
                            <input type="number" id="ph-hours" placeholder="e.g. 3" min="0" step="0.5">
                        </div>
                    </div>
                </div>
                <div class="form-field">
                    <label class="radio-option">
                        <input type="checkbox" id="shift-locum">
                        Locum shift
                    </label>
                </div>
                <div class="form-field">
                    <label for="shift-employer">Employer</label>
                    <select id="shift-employer">
                        <option value="">None</option>
                    </select>
                </div>
                <div class="form-buttons">
                    <button type="button" id="save-shift">Save Shift</button>
                    <button type="button" id="delete-shift" class="hidden">Delete Shift</button>
                </div>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        window.addEventListener('load', function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker
                    .register('./sw.js')
                    .then((registration) => {
                        registration.addEventListener('updatefound', () => {
                            const installingWorker = registration.installing
                            console.log('New service worker being installed:', installingWorker)
                        })
                    })
                    .catch((error) => {
                        console.error(`Service worker registration failed: ${error}`)
                    })
            } else {
                console.error('Service workers are not supported')
            }
                })
    </script>
</body>
</html>
